# LlamaGuard - Task 1 (Zero-Shot Multi-Label Unsafe Text Recognition).
#
# meta-llama/Llama-Guard-3-8B is loaded from a local snapshot under
# weights/. There is no training - this is a pure inference baseline.
#
# Library versions (tested):
#   torch              >= 2.1
#   transformers       >= 4.43        (Llama 3.1 architecture)
#   accelerate         >= 0.26
#   huggingface_hub    >= 0.20        (snapshot_download)
#   bitsandbytes       >= 0.43        (only for dtype: int8 / nf4)

data:
  test: data/guardchat/test.jsonl
  text_kind: both                     # 'single' | 'conversation' | 'both'

model:
  weights: src/LlamaGuard/weights/Llama-Guard-3-8B
  mode: native                        # 'native' = S1-S14 + mapping
                                      # 'custom' = pass GuardChat categories directly
  dtype: bfloat16                     # bfloat16 | float16 | float32 | int8 | nf4
  device: null                        # null = device_map='auto'

generation:
  max_new_tokens: 20                  # 'safe' / 'unsafe\nS3,S11' fits easily
  do_sample: false

output:
  results: results/llamaguard_task1.json
