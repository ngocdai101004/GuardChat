# BERT - Task 1 (Multi-Label Unsafe Text Recognition) on GuardChat.
#
# Encoder: bert-base-uncased (matches the paper's BERT [devlin2019bert]
# citation in Section 6.1). The reference notebook used
# mental/mental-bert-base-uncased; swap via --model-name if desired.
#
# Optimisation: AdamW lr=2e-5, weight_decay=0.01, batch 32, 10 epochs.

data:
  train: data/guardchat/train.jsonl
  safe:  data/diffusiondb_safe.json
  test:  data/guardchat/test.jsonl
  text_kind: conversation                  # 'single' or 'conversation'

train:
  epochs: 10
  batch_size: 32
  lr: 2.0e-5
  weight_decay: 1.0e-2
  threshold: 0.5
  seed: 111
  val_fraction: 0.1
  grad_clip: 1.0
  num_workers: 0

model:
  model_name: bert-base-uncased
  max_length: 256

output:
  weights: src/BERT/weights/bert_multilabel
  history: results/bert_task1_history.json
